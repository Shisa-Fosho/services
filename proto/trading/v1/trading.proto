syntax = "proto3";

package trading.v1;

option go_package = "github.com/Shisa-Fosho/services/proto/gen/trading/v1;tradingv1";

// TradingService handles order placement, matching, and book queries.
service TradingService {
  // GetStatus returns the health status of the trading service.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
}

message GetStatusRequest {}

message GetStatusResponse {
  string status = 1;
}

// MatchEvent is published to "trading.match" (JetStream, durable) every time
// the CLOB engine generates a trade. The settlement worker consumes this
// stream and executes on-chain settlement.
//
// All monetary amounts are in integer cents (1 = $0.01).
message MatchEvent {
  // match_id is the server-generated UUID used as the trade idempotency key.
  string match_id = 1;

  // Order identifiers.
  string maker_order_id = 2;
  string taker_order_id = 3;

  // Market this match belongs to.
  string market_id = 4;

  // Canonical execution price in integer cents (1..99).
  int64 price = 5;

  // Filled size in contracts.
  int64 size = 6;

  // Fees charged to each side in cents.
  int64 maker_fee = 7;
  int64 taker_fee = 8;

  // Denormalized wallet addresses for settlement convenience.
  string maker_address = 9;
  string taker_address = 10;

  // Unix seconds when the match was generated by the engine.
  int64 timestamp_unix = 11;
}
