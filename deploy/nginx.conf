upstream platform {
    server platform:8081;
}

upstream trading {
    server trading:8080;
}

server {
    listen 80;

    # Forward client IP information to upstreams.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Trading-service auth endpoints — Polymarket-compatible API-key lifecycle.
    # Exact-match locations win over the /auth/ prefix below, so these three
    # paths route to trading while everything else under /auth/ stays on
    # platform (session endpoints: nonce, signup, login, refresh, logout,
    # session).
    location = /auth/derive-api-key {
        proxy_pass http://trading;
    }

    location = /auth/api-keys {
        proxy_pass http://trading;
    }

    location = /auth/api-key {
        proxy_pass http://trading;
    }

    # Platform service routes.
    location /auth/ {
        proxy_pass http://platform;
    }

    location /admin/ {
        proxy_pass http://platform;
    }

    location /markets/ {
        proxy_pass http://platform;
    }

    location /data/ {
        proxy_pass http://platform;
    }

    # Trading service routes.
    location /orders/ {
        proxy_pass http://trading;
    }

    location /book/ {
        proxy_pass http://trading;
    }

    # WebSocket — must forward Upgrade/Connection headers so nginx
    # performs the HTTP→WS protocol switch rather than buffering.
    location /ws {
        proxy_pass http://trading;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Keep the tunnel open during quiet periods.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
