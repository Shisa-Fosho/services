services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shisa
      POSTGRES_PASSWORD: shisa
      POSTGRES_DB: shisa
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shisa -d shisa"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shisa

  nats:
    image: nats:2.11-alpine
    command: ["nats-server", "--config", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - natsdata:/data
      - ./nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shisa

  prometheus:
    image: prom/prometheus:v3.2.0
    ports:
      - "9090:9090"
    volumes:
      - promdata:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shisa

  loki:
    image: grafana/loki:3.4.0
    ports:
      - "3100:3100"
    volumes:
      - lokidata:/loki
      - ./loki.yml:/etc/loki/local-config.yaml:ro
    command: ["-config.file=/etc/loki/local-config.yaml"]
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shisa

  tempo:
    image: grafana/tempo:2.7.0
    ports:
      - "4317:4317"
      - "3200:3200"
    volumes:
      - tempodata:/var/tempo
      - ./tempo.yml:/etc/tempo/tempo.yaml:ro
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3200/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shisa

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shisa

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      trading:
        condition: service_healthy
      platform:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 0"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - shisa

  trading:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: trading
    ports:
      - "9001:9001"
      - "9091:9091"
    environment:
      DATABASE_URL: postgres://shisa:shisa@postgres:5432/shisa?sslmode=disable
      NATS_URL: nats://nats:4222
      GRPC_PORT: "9001"
      HTTP_PORT: "8080"
      METRICS_PORT: "9091"
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:9001"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - shisa

  platform:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: platform
    ports:
      - "9002:9002"
      - "9092:9092"
    environment:
      DATABASE_URL: postgres://shisa:shisa@postgres:5432/shisa?sslmode=disable
      NATS_URL: nats://nats:4222
      GRPC_PORT: "9002"
      HTTP_PORT: "8081"
      METRICS_PORT: "9092"
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:9002"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - shisa

  settlement:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: settlement
    ports:
      - "9093:9093"
    environment:
      DATABASE_URL: postgres://shisa:shisa@postgres:5432/shisa?sslmode=disable
      NATS_URL: nats://nats:4222
      METRICS_PORT: "9093"
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - shisa

  indexer:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: indexer
    ports:
      - "9094:9094"
    environment:
      DATABASE_URL: postgres://shisa:shisa@postgres:5432/shisa?sslmode=disable
      NATS_URL: nats://nats:4222
      METRICS_PORT: "9094"
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9094/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - shisa

volumes:
  pgdata:
  natsdata:
  promdata:
  grafanadata:
  lokidata:
  tempodata:

networks:
  shisa:
    driver: bridge
