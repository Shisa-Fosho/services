global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "trading"
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:9091"]

  - job_name: "platform"
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:9092"]

  - job_name: "settlement"
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:9093"]

  - job_name: "indexer"
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:9094"]
